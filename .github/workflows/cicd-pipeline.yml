# .github/workflows/cicd-pipeline.yml

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  # job 1 - Build Image
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-homepage:latest

  # job 2 - Deploy to Dev  // TODO
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Runner Public IP
        id: runner_ip
        run: echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.2.0

      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          printf -- "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

          # Get bastion IP from Terraform output
          BASTION_IP=$(cd ../terraform/dev && terraform output -raw bastion_public_ip)

          echo "Bastion IP: $BASTION_IP"
          echo "Waiting for SSH on Bastion..."
          sleep 30

          # Write SSH config for ProxyJump
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName $BASTION_IP
            User ec2-user
            IdentityFile /tmp/ssh_key.pem
            StrictHostKeyChecking no

          Host 10.0.*.*
            User ec2-user
            IdentityFile /tmp/ssh_key.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

          ansible-playbook -i inventory/dev.ini playbook.yml \
            --user ec2-user \
            --private-key /tmp/ssh_key.pem \
            --extra-vars "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}"

          rm /tmp/ssh_key.pem
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
